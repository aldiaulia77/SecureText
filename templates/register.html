{% extends "base.html" %}
{% block title %}Daftar // SecureText{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="auth-card block bg-cyan">
        <h2>🆕 Buat Akun SecureText</h2>
        <p class="sub">Daftar untuk mulai menggunakan platform kriptografi.</p>
        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="6">
            </div>
            <div class="field">
                <label for="confirm_password">Konfirmasi Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="6">
            </div>
            <button type="submit" class="btn btn-dark btn-block">Daftar</button>
        </form>
        <div class="auth-switch">
            Sudah punya akun? <a href="{{ url_for('auth.login') }}">Login di sini</a>
        </div>
    </div>
</div>
{% endblock %}
